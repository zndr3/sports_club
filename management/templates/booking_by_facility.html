{% extends 'base.html' %}

{% block title %}Bookings by Facility | Sports Club{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="d-flex flex-row justify-content-between align-items-center mb-4">
    <h2>Bookings</h2>
    <a href="{% url 'booking_create' %}" class="btn btn-primary">Add New Booking</a>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th scope="col">Member</th>
        <th scope="col">Start Time</th>
        <th scope="col">Slots</th>
        <th scope="col">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for b in bookings %}
      <tr>
        <td>{{ b.memid }}</td>
        <td>{{ b.starttime }}</td>
        <td>{{ b.slots }}</td>
        <td>
          <a href="{% url 'booking_update' b.id %}" class="btn btn-sm btn-warning">Edit</a>
          <a href="{% url 'booking_delete' b.id %}" class="btn btn-sm btn-danger">Delete</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  
  <a href="{% url 'booking_list' %}" class="btn btn-secondary">Back to Facilities</a>
</div>
{% endblock %}
