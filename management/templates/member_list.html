{% extends 'base.html' %}

{% block title %}Members | Sports Club{% endblock %}

{% block content %}
<div class="d-flex flex-column">

    <div class="d-flex flex-row justify-content-between">
        <h1>Members</h1>
        <a href="{% url 'member_create' %}" class="btn btn-primary">Add New Member</a>
    </div>

    <table class="table table-striped mt-3">
        <thead>
            <tr>
                <th>Name</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="member-table-body">
            <tr>
                <td colspan="2">Loading...</td>
            </tr>
        </tbody>
    </table>

</div>
{% endblock %}


{% block extra_js %}
<script>
document.addEventListener("DOMContentLoaded", function () {

    fetch("http://127.0.0.1:8000/api/members/")
        .then(res => res.json())
        .then(data => {

            const tbody = document.getElementById("member-table-body");
            tbody.innerHTML = "";

            // handle pagination or normal list
            const members = data.results || data;

            members.forEach(member => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${member.firstname} ${member.surname}</td>
                    <td>
                        <a href="/members/update/${member.id}/" class="btn btn-sm btn-warning">Edit</a>
                        <a href="/members/delete/${member.id}/" class="btn btn-sm btn-danger">Delete</a>
                    </td>
                `;

                tbody.appendChild(row);
            });
        })
        .catch(err => {
            console.error("Failed to load members:", err);

            const tbody = document.getElementById("member-table-body");
            tbody.innerHTML = "<tr><td colspan='2'>Error loading data</td></tr>";
        });

});
</script>
{% endblock %}
