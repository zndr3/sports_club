{% extends 'base.html' %}

{% block title %}Bookings | Sports Club{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="d-flex flex-row justify-content-between align-items-center mb-4">
    <h1>Facilities & Bookings</h1>
    <a href="{% url 'booking_create' %}" class="btn btn-primary">Add New Booking</a>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th scope="col">Facility</th>
        <th scope="col">Total Bookings</th>
      </tr>
    </thead>
    <tbody>
      {% for f in facilities %}
      <tr>
        <td>
          <a href="{% url 'booking_by_facility' f.pk %}">
            {{ f.name }}
          </a>
        </td>
        <td>{{ f.total }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
